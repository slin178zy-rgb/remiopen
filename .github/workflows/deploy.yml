name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/slin178zy-rgb/remiopen:latest

      - name: SSH 部署到服务器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_PRIVATE }}
          script: |
            docker pull ghcr.io/slin178zy-rgb/remiopen:latest
            docker stop new-api || true
            docker rm new-api || true
            docker run -d \
              --name new-api \
              --restart always \
              -p 3000:3000 \
              -v /data/new-api:/data \
              -e TZ=Asia/Shanghai \
              ghcr.io/slin178zy-rgb/remiopen:latest
            docker image prune -f
            echo "部署完成"